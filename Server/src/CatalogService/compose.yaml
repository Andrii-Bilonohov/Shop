services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
  
  presentation:
    build:
      context: .
      dockerfile: Presentation/Dockerfile
    ports:
      - "8001:80"
    depends_on:
      - sqlserver
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ItemDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;
